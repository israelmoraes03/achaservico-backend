<!DOCTYPE html>
<html>
<head>
    <title>Preview do Ícone AchaServiço</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            margin: 0;
            flex-direction: column;
            gap: 20px;
        }
        h1 { color: white; font-family: Arial; }
        .icon-container {
            display: flex;
            gap: 30px;
            align-items: flex-end;
        }
        .icon-box {
            text-align: center;
            color: #888;
            font-family: Arial;
        }
        .icon-box img {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <h1>Ícone AchaServiço</h1>
    <div class="icon-container">
        <div class="icon-box">
            <img src="assets/images/icon_new.png" width="256" height="256">
            <p>256x256</p>
        </div>
        <div class="icon-box">
            <img src="assets/images/icon_new.png" width="128" height="128">
            <p>128x128</p>
        </div>
        <div class="icon-box">
            <img src="assets/images/icon_new.png" width="64" height="64">
            <p>64x64</p>
        </div>
    </div>
</body>
</html>
