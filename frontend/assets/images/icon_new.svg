<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with rounded corners -->
  <rect width="1024" height="1024" rx="200" fill="#0A0A0A"/>
  
  <!-- Definitions -->
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main "A" shape with integrated wrench -->
  <g filter="url(#glow)" transform="translate(512, 512)">
    <!-- Letter A -->
    <path d="
      M 0 -280
      L -180 280
      L -100 280
      L -60 160
      L 60 160
      L 100 280
      L 180 280
      L 0 -280
      Z
      M 0 -100
      L -40 80
      L 40 80
      Z
    " fill="url(#greenGradient)" fill-rule="evenodd"/>
    
    <!-- Wrench extending from right side -->
    <g transform="translate(140, 180)">
      <!-- Wrench handle -->
      <rect x="0" y="-20" width="120" height="40" rx="8" fill="url(#greenGradient)"/>
      <!-- Wrench head -->
      <path d="
        M 120 -35
        L 180 -35
        L 200 -15
        L 200 15
        L 180 35
        L 120 35
        Z
      " fill="url(#greenGradient)"/>
      <!-- Wrench opening -->
      <rect x="150" y="-12" width="40" height="24" rx="4" fill="#0A0A0A"/>
    </g>
  </g>
</svg>
